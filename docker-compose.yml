services:
  postgres:
    image: postgres:16
    container_name: syncstay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: syncstay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - syncstay_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: syncstay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - syncstay_redis:/data

volumes:
  syncstay_pg:
  syncstay_redis:
